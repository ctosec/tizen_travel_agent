<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Agent</title>
    <style>
      html { background: #0f172a; }
      body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); overflow: hidden; margin: 0; width: 100vw; height: 100vh; cursor: none; }
      * { cursor: none; }
      #root { width: 1920px; height: 1080px; transform-origin: top left; }
      /* Hide scrollbars on TV (they still scroll, just no visible bar) */
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
